# 覆盖率工作流:在 main 推送和 PR 时生成测试覆盖率报告。
# 独立于主 CI 流程,避免拖慢 lint-and-test 的反馈速度。
name: Coverage

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web-build:
    name: Build Web Assets
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nodelite-server/web

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: nodelite-server/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-coverage
          path: nodelite-server/web/dist
          retention-days: 1

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: [web-build]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist-coverage
          path: nodelite-server/web/dist

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-coverage
          workspaces: |
            . -> target

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@cargo-tarpaulin

      - name: Run coverage
        env:
          NODELITE_SKIP_WEB_BUILD: 1
        run: cargo tarpaulin --config tarpaulin.toml

      - name: Upload HTML report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/tarpaulin/
          retention-days: 14
